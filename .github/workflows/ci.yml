name: CI

# Verifica cada push y cada Pull Request antes de desplegar a Vercel.
# Si algo falla (tipos, tests o build), el deploy no debe darse por bueno.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npm run lint

      - name: Run tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Valores ficticios solo para que el build compile en CI.
          # Las credenciales reales viven en Vercel.
          VITE_WHATSAPP_NUMBER: "584246263545"
          VITE_ADMIN_PASSCODE: "ci-build"
          VITE_DATA_SOURCE: "local"
