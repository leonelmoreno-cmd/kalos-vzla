<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo -->
  <rect width="64" height="64" rx="14" fill="#edf2e3" />

  <!-- Caja de regalo principal -->
  <g>
    <!-- Cuerpo de la caja -->
    <rect x="12" y="20" width="40" height="30" rx="3" fill="#005919" />

    <!-- División horizontal -->
    <line x1="12" y1="28" x2="52" y2="28" stroke="#edf2e3" stroke-width="2" />

    <!-- División vertical -->
    <line x1="32" y1="20" x2="32" y2="50" stroke="#edf2e3" stroke-width="2" />

    <!-- Lazo arriba (izquierda) -->
    <path d="M 24 20 Q 24 10 28 10 L 28 20" stroke="#005919" stroke-width="2.5" fill="none" stroke-linecap="round" />

    <!-- Lazo arriba (derecha) -->
    <path d="M 40 20 Q 40 10 36 10 L 36 20" stroke="#005919" stroke-width="2.5" fill="none" stroke-linecap="round" />

    <!-- Moño central -->
    <circle cx="32" cy="12" r="3.5" fill="#005919" />

    <!-- Brillo en la caja -->
    <ellipse cx="20" cy="32" rx="4" ry="5" fill="#edf2e3" opacity="0.3" />
  </g>
</svg>
